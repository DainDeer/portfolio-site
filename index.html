<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>internetcreature OS</title>
<link rel="icon" type="image/png" href="favicon.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<meta name="description" content="dain's corner of the internet — a lil pastel desktop OS holding my resume, projects, and other creature things 🦌" />
<meta name="theme-color" content="#b9b8e8" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://internetcreature.dev/" />
<meta property="og:title" content="internetcreature OS" />
<meta property="og:description" content="dain's corner of the internet — a lil pastel desktop OS holding my resume, projects, and other creature things." />
<meta property="og:image" content="https://internetcreature.dev/dain.jpg" />
<meta name="twitter:card" content="summary" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --desktop: #b9b8e8;            /* placeholder solid desktop, swappable */
    --window-face: #fdf6fb;
    --window-border: #c9b3ec;
    --text: #3a2a40;
    --muted: #8a7a92;
    --dim: #b3a6bb;
    --pink: #f4a6cb;
    --pink-deep: #e98fbb;
    --lav: #c9b3ec;
    --sage: #9fe0ad;
    --sage-deep: #79c78d;
    --taskbar-h: 46px;
    --titlebar-h: 34px;
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* ───────── desktop ───────── */
  #desktop {
    position: fixed;
    inset: 0 0 var(--taskbar-h) 0;
    background: var(--desktop) url("site_background.png") center bottom / cover no-repeat;
    image-rendering: pixelated;   /* keep pixel art crisp when upscaled */
    overflow: hidden;
  }

  #icons {
    position: absolute; top: 14px; left: 14px; bottom: 8px;
    display: flex; flex-direction: column; flex-wrap: wrap;
    align-content: flex-start; gap: 6px;
  }

  /* the xp-style corner watermark, but it's a promise instead of a version number */
  #tagline {
    position: absolute; right: 18px; bottom: 14px;
    font-size: 15px; font-weight: 700; font-style: italic;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 1px 3px rgba(60,40,70,0.75);
    text-align: right; pointer-events: none; z-index: 5;
  }
  .icon {
    width: 84px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px;
    border: 1px solid transparent; border-radius: 6px;
    cursor: pointer; text-align: center;
  }
  .icon .glyph { font-size: 30px; line-height: 1; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2)); }
  .icon .label {
    font-size: 12px; font-weight: 600; color: #fff;
    text-shadow: 0 1px 3px rgba(60,40,70,0.7); word-break: break-word;
  }
  .icon:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.28); }
  .icon.selected { background: rgba(201,179,236,0.45); border-color: rgba(255,255,255,0.5); }
  .icon.selected .label { background: rgba(74,52,80,0.35); border-radius: 3px; }

  /* ───────── window (generic frame, created by the manager) ───────── */
  .window {
    position: absolute; top: 0; left: 0;
    width: min(460px, calc(100% - 24px));
    background: var(--window-face);
    border: 1px solid var(--window-border);
    border-radius: 10px 10px 7px 7px;
    box-shadow: 0 18px 50px -12px rgba(60,40,70,0.5), 0 0 0 1px rgba(255,255,255,0.6) inset;
    display: flex; flex-direction: column; overflow: hidden;
    will-change: transform;            /* GPU-composited dragging */
  }
  .window.hidden { display: none; }

  .titlebar {
    height: var(--titlebar-h); display: flex; align-items: center;
    padding: 0 6px 0 10px; gap: 8px; cursor: grab; position: relative;
    background: linear-gradient(180deg, #f9c8e0 0%, #f4a6cb 9%, #ee98c2 48%, #e98fbb 90%, #f3aacd 100%);
    border-radius: 9px 9px 0 0;
    touch-action: none;               /* let us own touch dragging */
  }
  .titlebar::after {
    content: ''; position: absolute; left: 8px; right: 8px; top: 2px; height: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0));
    border-radius: 8px; pointer-events: none;
  }
  .titlebar:active { cursor: grabbing; }
  .titlebar .t-icon { font-size: 16px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }
  .titlebar .t-title {
    flex: 1; color: #fff; font-weight: 700; font-size: 14px;
    text-shadow: 0 1px 2px rgba(120,50,90,0.7);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .t-controls { display: flex; gap: 4px; }
  .t-btn {
    width: 22px; height: 22px;
    border: 1px solid rgba(255,255,255,0.7); border-radius: 5px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.12));
    color: #fff; font-size: 13px; font-weight: 800; line-height: 1;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    text-shadow: 0 1px 1px rgba(120,50,90,0.6);
  }
  .t-btn:hover { background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.3)); }
  .t-btn.close { background: linear-gradient(180deg, #ff9fb6, #ec6f90); border-color: rgba(255,255,255,0.6); }
  .t-btn.close:hover { background: linear-gradient(180deg, #ffb3c5, #f07d9c); }

  .window-body {
    padding: 0; overflow: auto;
    max-height: 60vh; min-height: 200px;
    background: var(--body-bg, transparent);
    -webkit-user-select: text; user-select: text;
  }

  /* maximized: fill the whole desktop and center sparse content (resume opts out — it's its own long-form page) */
  .window.maximized .window-body:not(:has(> .resume)) {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .window.maximized .window-body:has(> .doc) > .doc {
    width: 100%; max-width: 640px;
  }
  /* padded text-document programs opt into this; bare programs (image viewer) don't */
  .doc { padding: 22px 22px 26px; }

  /* ── image-viewer program (edge-to-edge) ── */
  .imgview {
    position: relative; min-height: 240px;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #f6e9f3, #eee3f7);
  }
  .imgview-img { display: block; max-width: 100%; max-height: 54vh; width: auto; height: auto; }
  .imgview-credit {
    position: absolute; right: 10px; bottom: 10px;
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(58,42,64,0.6); backdrop-filter: blur(6px);
    color: #fff; font-size: 12px; font-weight: 600;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .imgview-credit a {
    color: #ffd0e6; font-weight: 700; text-decoration: none;
    border-bottom: 1px dashed rgba(255,208,230,0.6);
  }
  .imgview-credit a:hover { color: #fff; }
  .imgview-empty {
    margin: 22px; padding: 40px 24px; text-align: center;
    border: 1.5px dashed var(--dim); border-radius: 12px; background: rgba(201,179,236,0.06);
  }
  .imgview-empty .big { font-size: 40px; display: block; margin-bottom: 10px; }
  .imgview-empty p { color: var(--muted); font-size: 13.5px; line-height: 1.55; }
  .imgview-empty code { background: #f0e4ee; color: #7a5c72; padding: 1px 6px; border-radius: 5px; font-size: 12px; }

  .doc-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--lav); margin-bottom: 6px;
  }
  .doc-title { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 16px; }
  .placeholder {
    border: 1.5px dashed var(--dim); border-radius: 10px;
    padding: 26px 20px; text-align: center; background: rgba(201,179,236,0.06);
  }
  .placeholder .mark { font-size: 26px; display: block; margin-bottom: 8px; }
  .placeholder p { color: var(--muted); font-size: 14px; line-height: 1.55; }
  .placeholder p.sub { color: var(--dim); font-size: 12.5px; margin-top: 6px; }

  /* ── project / text documents ── */
  .doc p { color: var(--text); font-size: 14px; line-height: 1.65; }
  .doc p + p { margin-top: 12px; }
  .doc b { color: #6a3a5c; font-weight: 800; }
  /* the chordial / DORMANT wordmark — serif, italic, off-brand on purpose */
  .brand {
    font-family: 'Lora', Georgia, serif; font-weight: 700; font-style: italic;
    color: var(--pink-deep); letter-spacing: 0.01em;
  }
  .doc-title.brand { font-size: 26px; }

  .doc-link {
    display: inline-flex; align-items: center; gap: 7px;
    margin: 0 0 18px; padding: 8px 15px;
    background: linear-gradient(180deg, #f9c8e0, #f4a6cb 55%, #e98fbb);
    color: #fff; font-weight: 700; font-size: 13px; text-decoration: none;
    border-radius: 999px; border: 1px solid rgba(255,255,255,0.6);
    box-shadow: 0 5px 14px -5px rgba(233,143,187,0.85), 0 0 0 1px rgba(255,255,255,0.5) inset;
    text-shadow: 0 1px 1px rgba(120,50,90,0.5);
  }
  .doc-link:hover { filter: brightness(1.05); transform: translateY(-1px); }
  .doc-link .gh { font-size: 15px; }

  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 18px; }
  .tag {
    font-size: 11.5px; font-weight: 700; color: #7a5c72;
    background: #f0e4ee; padding: 4px 11px; border-radius: 999px;
  }
  .doc .note { color: var(--muted); font-size: 12.5px; font-style: italic; margin-top: 16px; }

  /* ── contact program ── */
  .contact-list { display: flex; flex-direction: column; gap: 10px; margin-top: 16px; }
  .contact-row {
    display: flex; align-items: center; gap: 13px; padding: 12px 15px;
    border: 1px solid var(--window-border); border-radius: 11px;
    background: rgba(201,179,236,0.08); transition: background .15s ease;
  }
  .contact-row:hover { background: rgba(244,166,203,0.12); }
  .contact-row .ic { font-size: 21px; line-height: 1; }
  .contact-row a { color: var(--pink-deep); font-weight: 800; font-size: 14px; text-decoration: none; }
  .contact-row a:hover { color: #8a3c6e; border-bottom: 1px dashed rgba(184,86,143,0.5); }
  .contact-row small { display: block; color: var(--muted); font-weight: 600; font-size: 11px; margin-top: 2px; }

  /* ── resume program ── */
  .resume { background: #ece7f0; min-height: 100%; }
  .resume-page {
    background: #fff; color: #26212e;
    max-width: 780px; margin: 0 auto; padding: 36px 46px 52px;
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 13.5px; line-height: 1.5;
  }
  .r-head { display: flex; gap: 18px; align-items: flex-start; }
  .r-headtext { flex: 1; min-width: 0; }
  .r-name { font-family: 'Lora', Georgia, serif; font-size: 30px; font-weight: 600; color: #1e1a26; letter-spacing: -0.01em; }
  .r-role { font-size: 14px; font-weight: 600; color: #6a5c78; margin-top: 2px; }
  .r-contact { font-size: 12px; color: #5a5263; margin-top: 9px; line-height: 1.7; }
  .r-contact a { color: inherit; text-decoration: none; }       /* plain ink in default */
  /* phone number is an image so scrapers can't harvest it.
     source PNG is square with the text in the top band; object-fit crops to just the text */
  .r-phone {
    width: 82px; height: 16px; vertical-align: -3px;
    object-fit: cover; object-position: top left;
  }
  .r-sec { margin-top: 22px; }
  .r-sec h2 {
    font-size: 12px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase;
    color: #7a4a6e; border-bottom: 1.5px solid #e7dcee; padding-bottom: 4px; margin-bottom: 11px;
  }
  .r-summary { color: #3a3344; }
  .r-skills { display: grid; gap: 6px; }
  .r-skills .row b { color: #26212e; }

  .r-exp { margin-bottom: 17px; }
  .r-exp::after { content: ''; display: table; clear: both; }
  .r-exp .l1 { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
  .r-exp .co { font-weight: 700; color: #1e1a26; font-size: 14px; }
  .r-exp .dates { color: #6a5c78; font-size: 11.5px; white-space: nowrap; }
  .r-exp .l2 { display: flex; justify-content: space-between; gap: 12px; color: #6a5c78; font-size: 12px; font-style: italic; margin: 1px 0 7px; }
  .r-exp ul { margin: 0 0 0 17px; }
  .r-exp li { margin: 5px 0; color: #3a3344; }
  .r-edu { display: flex; justify-content: space-between; gap: 12px; }
  .r-edu b { color: #1e1a26; }

  /* per-job polaroid photos — interactive only */
  .r-polaroid { display: none; }
  .resume.interactive .r-polaroid {
    display: block; float: right; width: 150px; margin: 2px 0 10px 18px;
    background: #fff; padding: 8px 8px 0; border-radius: 3px; border: 1px solid #efe6f0;
    box-shadow: 0 7px 20px -7px rgba(60,40,70,0.45);
    transform: rotate(2deg); transition: transform .2s ease, box-shadow .2s ease;
  }
  .resume.interactive .r-polaroid.tilt-l { transform: rotate(-2.5deg); }
  .resume.interactive .r-polaroid:hover { transform: rotate(0) translateY(-3px); box-shadow: 0 14px 30px -8px rgba(60,40,70,0.5); }
  .r-polaroid img, .r-polaroid-ph {
    width: 100%; aspect-ratio: 4 / 3; object-fit: cover; display: block; border-radius: 2px;
    background: linear-gradient(135deg, #f6e9f3, #eee3f7);
  }
  .r-polaroid-ph { display: flex; align-items: center; justify-content: center; font-size: 30px; color: #b9a6c4; }
  .r-polaroid figcaption { font-size: 11px; color: #7a6c86; text-align: center; padding: 7px 2px 9px; font-weight: 600; }
  @media (max-width: 520px) {
    .resume.interactive .r-polaroid { float: none; width: 150px; margin: 6px auto 12px; }
  }

  .resume.interactive .r-contact a {
    color: #b8568f; border-bottom: 1px solid rgba(184,86,143,0.3);
  }
  .resume.interactive .r-contact a:hover { color: #8a3c6e; }

  /* sticky toggle footer */
  .resume-toggle {
    position: sticky; bottom: 0; z-index: 2;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    padding: 8px 14px; background: rgba(253,246,251,0.94); backdrop-filter: blur(6px);
    border-top: 1px solid #e7dcee;
  }
  .r-print {
    font: inherit; font-size: 12px; font-weight: 700; color: #6a5c78;
    background: none; border: 1px solid #d8c8e2; border-radius: 7px; padding: 5px 11px; cursor: pointer;
  }
  .r-print:hover { background: #f3ebf7; color: #3a2a40; }
  .seg { display: flex; align-items: center; position: relative; background: #ece2f2; border-radius: 999px; padding: 3px; }
  .seg button {
    font: inherit; font-size: 12px; font-weight: 700; color: #7a6c86;
    background: none; border: none; cursor: pointer; padding: 5px 15px; border-radius: 999px;
    position: relative; z-index: 1; transition: color .18s ease;
  }
  .seg button.on { color: #fff; }
  .seg .knob {
    position: absolute; top: 3px; bottom: 3px; left: 3px; width: calc(50% - 3px);
    background: linear-gradient(180deg, #f4a6cb, #e98fbb); border-radius: 999px; z-index: 0;
    transition: transform .22s cubic-bezier(.4,1.2,.4,1), background .22s ease;
  }
  .resume.interactive .seg .knob { transform: translateX(100%); background: linear-gradient(180deg, #b9e6c2, #8fd49f); }

  /* ───────── taskbar ───────── */
  #taskbar {
    position: fixed; left: 0; right: 0; bottom: 0; height: var(--taskbar-h);
    display: flex; align-items: center; padding-right: 4px;
    background: linear-gradient(180deg, #cdbbed 0%, #c2a9e6 7%, #b89ce0 50%, #ad8ed8 93%, #c4b0ea 100%);
    border-top: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 -2px 8px rgba(60,40,70,0.25); z-index: 100;
  }
  #start {
    height: 100%; display: flex; align-items: center; gap: 7px;
    padding: 0 18px 0 12px; border: none; font-family: inherit;
    font-size: 16px; font-weight: 800; font-style: italic; color: #fff;
    text-shadow: 0 1px 2px rgba(40,80,50,0.6); cursor: pointer;
    border-radius: 0 12px 12px 0;
    background: linear-gradient(180deg, #b6ecc0 0%, #97dca6 46%, #7fce90 56%, #74c688 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 2px 0 6px rgba(60,40,70,0.25);
  }
  #start .deer {
    width: 32px; height: 32px; image-rendering: pixelated;
    filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25));
    transform: translateY(2px);   /* art sits in the top 28 of 32 pixel rows */
  }
  #start:hover { background: linear-gradient(180deg, #c4f0cd 0%, #a4e2b2 46%, #8bd49b 56%, #80cf93 100%); }
  #start.active { box-shadow: inset 0 2px 5px rgba(40,80,50,0.45); }

  .tasks { flex: 1; display: flex; align-items: center; gap: 6px; padding: 0 8px; height: 100%; }
  .task-btn {
    display: flex; align-items: center; gap: 7px;
    height: 30px; min-width: 150px; max-width: 200px; padding: 0 12px;
    border: 1px solid rgba(255,255,255,0.4); border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.12));
    color: #fff; font-weight: 700; font-size: 13px;
    text-shadow: 0 1px 1px rgba(80,50,90,0.5); cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-btn.pressed {
    background: linear-gradient(180deg, rgba(120,90,140,0.35), rgba(150,120,170,0.2));
    box-shadow: inset 0 2px 4px rgba(60,40,70,0.45);
  }

  #clock {
    height: 100%; display: flex; align-items: center; padding: 0 14px; margin-left: 4px;
    color: #fff; font-weight: 700; font-size: 13px; text-shadow: 0 1px 1px rgba(80,50,90,0.5);
    border-left: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08);
  }


  /* ───────── start menu ───────── */
  #startmenu {
    position: fixed; left: 6px; bottom: calc(var(--taskbar-h) + 6px); width: 240px;
    background: var(--window-face); border: 1px solid var(--lav); border-radius: 10px;
    box-shadow: 0 18px 50px -10px rgba(60,40,70,0.55); overflow: hidden; display: none; z-index: 120;
  }
  #startmenu.open { display: block; animation: pop .14s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .sm-header {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: linear-gradient(180deg, #f4a6cb, #e98fbb); color: #fff;
  }
  .sm-header .av { font-size: 26px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25)); }
  .sm-header .who { font-weight: 800; font-size: 15px; text-shadow: 0 1px 2px rgba(120,50,90,0.6); }
  .sm-header .who small { display: block; font-weight: 600; font-size: 11px; opacity: 0.9; }
  .sm-tagline {
    padding: 8px 14px;
    font-size: 11.5px; font-weight: 700; font-style: italic;
    color: var(--muted); text-align: center; text-wrap: balance;
    background: #f9eef6; border-bottom: 1px solid #f0e4ee;
  }
  .sm-list { padding: 6px; }
  .sm-item {
    display: flex; align-items: center; gap: 10px; width: 100%; padding: 8px 10px;
    border: none; background: none; font-family: inherit; font-size: 13.5px; font-weight: 600;
    color: var(--text); border-radius: 6px; cursor: pointer; text-align: left;
  }
  .sm-item .g { font-size: 18px; width: 22px; text-align: center; }
  .sm-item:hover { background: linear-gradient(180deg, #f4a6cb, #e98fbb); color: #fff; }
  .sm-foot { border-top: 1px solid #f0e4ee; padding: 6px; display: flex; justify-content: flex-end; }
  .sm-shutdown {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px; border: none; background: none;
    font-family: inherit; font-size: 13px; font-weight: 700; color: var(--muted);
    border-radius: 6px; cursor: pointer;
  }
  .sm-shutdown:hover { background: #f6ecf3; color: var(--text); }

  #toast {
    position: fixed; left: 50%; top: 40%; transform: translate(-50%,-50%) scale(0.96);
    background: rgba(58,42,64,0.92); color: #fff; font-weight: 700; font-size: 15px;
    padding: 14px 22px; border-radius: 12px; box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; z-index: 200; transition: opacity .3s ease, transform .3s ease;
  }
  #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  @media (max-width: 520px) {
    .icon { width: 72px; }
    .window { width: calc(100% - 16px); }
  }

  /* print only the resume page, no OS chrome (falls back to a normal print when no resume is open) */
  @media print {
    body:has(.resume-page) * { visibility: hidden !important; }
    .resume-page, .resume-page * { visibility: visible !important; }

    const segR = root.querySelector('.mode-resume');

  const PROGRAMS = {
    resume:      { icon: '📄', title: 'resume.doc',           bg: '#ece7f0', render( ){ return makeResume(); } },
    'dain-img':  { icon: '🖼️', title: 'dain.jpg',             bg: '#fdeee0', render( ){ return makeImageViewer({ src: 'dain.jpg', alt: 'dain — character art', credit: 'Pricklepants', url: 'https://bsky.app/profile/pricklepants.bsky.social' }); } },
    'josh-img':  { icon: '📸', title: 'Josh.jpg',             bg: '#e3eefc', render( ){ return makeImageViewer({ src: 'Josh.jpg', alt: 'Josh' }); } },
    chordial:    { icon: '💬', title: 'chordial',             bg: '#fdeaf3', render( ){ return makeProjectDoc({
      title: 'chordial', brandTitle: true,
      repo: 'https://github.com/DainDeer/chordial-mvp',
      body:
        '<p><span class="brand">chordial</span> is a personal project of mine around an ambient AI presence. ' +
        'it is a chatbot similar to ChatGPT, Claude, etc, but it can proactively reach out to you!</p>' +
        '<p>currently the GPT API is used, along with Discord integration as the communication platform ' +
        'with the bot, but in the full version, the bot will be able to be chatted with across multiple ' +
        'platforms: Discord, Telegram, WhatsApp, in addition to customization of the AI service and model used.</p>',
    }); } },
    'chaos-cube':{ icon: '🎴', title: 'chaos-commander-cube', bg: '#fdf6df', render( ){ return makeProjectDoc({
      title: 'chaos-commander-cube',
      repo: 'https://github.com/DainDeer/chaos-commander-cube',
      body:
        '<p>A Tabletop Simulator experience, which generates a truly unique Cube Draft format each time.</p>',
    }); } },
    'llm-weave': { icon: '🧶', title: 'llm-weave',            bg: '#e3f7ec', render( ){ return makeProjectDoc({
      title: 'llm-weave',
      repo: 'https://github.com/DainDeer/llm-weave',
      body:
        '<p>An early-stages project, exploring the synthesis of exports of a user\'s chat logs ' +
        'from multiple AI services.</p>',
    }); } },
    dormant:     { icon: '📖', title: 'DORMANT.txt',          bg: '#eee3f7', render( ){ return makeProjectDoc({
      title: 'DORMANT.txt', eyebrow: 'writing',
      body:
        '<p>An era-spanning sci-fi epic, dealing with themes of AI, self, ' +
        'and the current state of the world.</p>',
      note: 'writing in progress',
    }); } },
    contact:     { icon: '✉️', title: 'contact',              bg: '#fbeaf0', render( ){ return makeContact(); } },
  };
  const DESKTOP_ICONS = ['dain-img', 'josh-img', 'resume', 'chordial', 'chaos-cube', 'dormant', 'contact'];

  const desk    = document.getElementById('desktop');
  const tasksEl = document.getElementById('tasks');

  /* ── window factory: a generic frame, no content knowledge ───── */
  function makeWindow() {
    const el = document.createElement('div');
    el.className = 'window';
    el.setAttribute('role', 'dialog');
    el.innerHTML =
      '<div class="titlebar">' +
        '<span class="t-icon"></span>' +
        '<span class="t-title"></span>' +
        '<div class="t-controls">' +
          '<button class="t-btn min" title="minimize" aria-label="minimize">_</button>' +
          '<button class="t-btn max" title="maximize" aria-label="maximize">▢</button>' +
          '<button class="t-btn close" title="close" aria-label="close">✕</button>' +
        '</div>' +
      '</div>' +
      '<div class="window-body"></div>';
    desk.appendChild(el);
    return {
      el,
      titlebar: el.querySelector('.titlebar'),
      iconEl:   el.querySelector('.t-icon'),
      titleEl:  el.querySelector('.t-title'),
      bodyEl:   el.querySelector('.window-body'),
      btnMin:   el.querySelector('.min'),
      btnMax:   el.querySelector('.max'),
      btnClose: el.querySelector('.close'),
      x: 0, y: 0, key: null, taskBtn: null,
      maximized: false, minimized: false, prev: null,
    };
  }

  function place(w) { w.el.style.transform = 'translate(' + w.x + 'px,' + w.y + 'px)'; }

  /* ── window manager ──────────────────────────────────────────── */
  const WM = {
    config: { maxWindows: 1, reuseWhenCapped: true },
    windows: [],
    z: 10,

    open(key) {
      if (!PROGRAMS[key]) return;

      // already open? restore + focus it.
      const existing = this.windows.find(w => w.key === key);
      if (existing) { this.restore(existing); this.focus(existing); history.replaceState(null, '', '#' + key); return; }

      // at cap? reuse the most recent window (this is the single-window swap).
      if (this.windows.length >= this.config.maxWindows && this.config.reuseWhenCapped) {
        const w = this.windows[this.windows.length - 1];
        this.bind(w, key); this.restore(w); this.focus(w);
        history.replaceState(null, '', '#' + key);
        return;
      }

      // otherwise spin up a fresh window.
      const w = makeWindow();
      this.windows.push(w);
      this.wire(w);
      this.bind(w, key);
      this.center(w);
      this.focus(w);
      history.replaceState(null, '', '#' + key);
    },

    // attach a program's content to a window frame (the decoupling point)
    bind(w, key) {
      const spec = PROGRAMS[key];
      w.key = key;
      w.iconEl.textContent = spec.icon;
      w.titleEl.textContent = spec.title;
      w.el.setAttribute('aria-label', spec.title);
      w.el.style.setProperty('--body-bg', spec.bg || '');
      w.bodyEl.replaceChildren(spec.render(spec.title));
      w.bodyEl.scrollTop = 0;
      this.syncTask(w);
    },

    center(w) {
      const dw = desk.clientWidth, dh = desk.clientHeight;
      const r = w.el.getBoundingClientRect();
      w.x = Math.max(8, (dw - r.width) / 2);
      w.y = Math.max(8, (dh - r.height) / 2 - 10);
      place(w);
    },

    focus(w) { w.el.style.zIndex = ++this.z; },

    minimize(w) { w.minimized = true; w.el.classList.add('hidden'); if (w.taskBtn) w.taskBtn.classList.add('pressed'); },
    restore(w)  { w.minimized = false; w.el.classList.remove('hidden'); if (w.taskBtn) w.taskBtn.classList.remove('pressed'); },
    toggleMin(w){ if (w.minimized) { this.restore(w); this.focus(w); } else { this.minimize(w); } },

    toggleMax(w) {
      if (!w.maximized) {
        w.prev = { x: w.x, y: w.y, width: w.el.style.width };
        w.x = 0; w.y = 0; place(w);
        /* percentages, not pixel snapshots — desk can be 0-sized at boot (embedded
           views) and the window should track later resizes anyway */
        w.el.style.width = '100%';
        w.el.style.height = '100%';
        w.el.style.borderRadius = '0';
        w.bodyEl.style.maxHeight = 'none';
        w.bodyEl.style.height = 'calc(100% - var(--titlebar-h))';
        w.el.classList.add('maximized');
        w.maximized = true;
      } else {
        w.x = w.prev.x; w.y = w.prev.y; place(w);
        w.el.style.width = w.prev.width || 'min(460px, calc(100% - 24px))';
        w.el.style.height = '';
        w.el.style.borderRadius = '10px 10px 7px 7px';
        w.bodyEl.style.maxHeight = '60vh';
        w.bodyEl.style.height = '';
        w.el.classList.remove('maximized');
        w.maximized = false;
      }
    },

    close(w) {
      if (w.taskBtn) w.taskBtn.remove();
      w.el.remove();
      this.windows = this.windows.filter(x => x !== w);
      // drop the deep-link hash so a refresh doesn't resurrect the closed window
      if (location.hash === '#' + w.key) history.replaceState(null, '', location.pathname + location.search);
    },

    // one taskbar button per window
    syncTask(w) {
      const spec = PROGRAMS[w.key];
      if (!w.taskBtn) {
        const b = document.createElement('button');
        b.className = 'task-btn';
        b.addEventListener('click', () => this.toggleMin(w));
        tasksEl.appendChild(b);
        w.taskBtn = b;
      }
      w.taskBtn.innerHTML = '<span>' + spec.icon + '</span> <span>' + spec.title + '</span>';
    },

    // controls + dragging for a window
    wire(w) {
      w.btnClose.addEventListener('click', () => this.close(w));
      w.btnMin.addEventListener('click', () => this.minimize(w));
      w.btnMax.addEventListener('click', () => this.toggleMax(w));
      w.el.addEventListener('pointerdown', () => this.focus(w), true);

      let dragging = false, sx = 0, sy = 0;
      w.titlebar.addEventListener('pointerdown', e => {
        if (e.target.closest('.t-btn') || w.maximized) return;
        dragging = true; sx = e.clientX - w.x; sy = e.clientY - w.y;
        w.titlebar.setPointerCapture(e.pointerId);
      });
      w.titlebar.addEventListener('pointermove', e => {
        if (!dragging) return;
        const dw = desk.clientWidth, dh = desk.clientHeight, ww = w.el.offsetWidth;
        w.x = Math.max(80 - ww, Math.min(e.clientX - sx, dw - 80));
        w.y = Math.max(0, Math.min(e.clientY - sy, dh - TITLEBAR_H));
        place(w);
      });
      const end = () => { dragging = false; };
      w.titlebar.addEventListener('pointerup', end);
      w.titlebar.addEventListener('pointercancel', end);
    },
  };

  /* keep restored windows reachable when the browser shrinks */
  window.addEventListener('resize', () => {
    WM.windows.forEach(w => {
      if (w.maximized || w.minimized) return;
      const dw = desk.clientWidth, dh = desk.clientHeight, ww = w.el.offsetWidth;
      w.x = Math.max(80 - ww, Math.min(w.x, dw - 80));
      w.y = Math.max(0, Math.min(w.y, dh - TITLEBAR_H));
      place(w);
    });
  });

  /* ── desktop icons ───────────────────────────────────────────── */
  const iconsEl = document.getElementById('icons');
  DESKTOP_ICONS.forEach(key => {
    const spec = PROGRAMS[key];
    const el = document.createElement('div');
    el.className = 'icon'; el.tabIndex = 0;
    el.setAttribute('role', 'button');
    el.setAttribute('aria-label', 'open ' + spec.title);
    el.innerHTML = '<span class="glyph">' + spec.icon + '</span><span class="label">' + spec.title + '</span>';
    el.addEventListener('click', e => { e.stopPropagation(); clearSelection(); el.classList.add('selected'); });
    el.addEventListener('dblclick', () => WM.open(key));
    el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); WM.open(key); } });
    let lastTap = 0;
    el.addEventListener('pointerup', e => {
      if (e.pointerType === 'touch') {
        const now = Date.now();
        if (now - lastTap < 400) WM.open(key);
        lastTap = now;
      }
    });
    iconsEl.appendChild(el);
  });
  function clearSelection() { document.querySelectorAll('.icon.selected').forEach(i => i.classList.remove('selected')); }
  desk.addEventListener('click', () => { clearSelection(); closeStart(); });

  /* ── start menu ──────────────────────────────────────────────── */
  const smList = document.getElementById('smList');
  Object.keys(PROGRAMS).forEach(key => {
    const spec = PROGRAMS[key];
    const b = document.createElement('button');
    b.className = 'sm-item';
    b.innerHTML = '<span class="g">' + spec.icon + '</span>' + spec.title;
    b.addEventListener('click', e => { e.stopPropagation(); closeStart(); WM.open(key); });
    smList.appendChild(b);
  });
  const startBtn = document.getElementById('start');
  const startMenu = document.getElementById('startmenu');
  function openStart() { startMenu.classList.add('open'); startBtn.classList.add('active'); }
  function closeStart() { startMenu.classList.remove('open'); startBtn.classList.remove('active'); }
  startBtn.addEventListener('click', e => { e.stopPropagation(); startMenu.classList.contains('open') ? closeStart() : openStart(); });
  startMenu.addEventListener('click', e => e.stopPropagation());
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeStart(); });

  /* ── shutdown gag ────────────────────────────────────────────── */
  const toast = document.getElementById('toast');
  document.getElementById('shutdown').addEventListener('click', e => {
    e.stopPropagation(); closeStart();
    toast.textContent = 'goodnight, creature 🌙';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  });

  /* ── live clock ──────────────────────────────────────────────── */
  function tick() {
    const d = new Date(); let h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ap;
  }
  (function scheduleTick() {
    tick();
    setTimeout(scheduleTick, 60000 - (Date.now() % 60000) + 250); // re-tick just past each minute mark
  })();

  /* ── deep-link router ────────────────────────────────────────
     internetcreature.dev/#resume  → opens that program, maximized.
     works for any program key (#chordial, #dain-img, …).            */
  function maximizeKey(key) {
    const w = WM.windows.find(x => x.key === key);
    if (w && !w.maximized) WM.toggleMax(w);
  }
  function routeFromHash() {
    const key = (location.hash || '').replace('#', '');
    if (PROGRAMS[key]) { WM.open(key); maximizeKey(key); }
  }
  window.addEventListener('hashchange', routeFromHash);

  /* boot: honor a deep link if present, else open the resume normally */
  const startKey = (location.hash || '').replace('#', '');
  if (PROGRAMS[startKey]) { WM.open(startKey); maximizeKey(startKey); }
  else { WM.open('resume'); maximizeKey('resume'); }
})();
</script>
</body>
</html>
