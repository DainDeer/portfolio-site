<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>internetcreature OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* placeholder desktop — solid pastel for now */
    --desktop: #b9b8e8;

    /* XP-pastel "Luna" reskin */
    --window-face: #fdf6fb;
    --window-border: #c9b3ec;
    --text: #3a2a40;
    --muted: #8a7a92;
    --dim: #b3a6bb;

    --pink: #f4a6cb;
    --pink-deep: #e98fbb;
    --lav: #c9b3ec;
    --sage: #9fe0ad;
    --sage-deep: #79c78d;

    --taskbar-h: 46px;
  }

  html, body { height: 100%; }
  body {
    font-family: 'Nunito', system-ui, sans-serif;
    color: var(--text);
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }

  /* ───────── desktop ───────── */
  #desktop {
    position: fixed;
    inset: 0 0 var(--taskbar-h) 0;
    background: var(--desktop);
    overflow: hidden;
  }

  /* desktop icons */
  #icons {
    position: absolute;
    top: 14px; left: 14px;
    display: flex; flex-direction: column;
    gap: 6px;
  }
  .icon {
    width: 84px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 8px 4px;
    border: 1px solid transparent;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
  }
  .icon .glyph {
    font-size: 30px;
    line-height: 1;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
  }
  .icon .label {
    font-size: 12px; font-weight: 600;
    color: #fff;
    text-shadow: 0 1px 3px rgba(60,40,70,0.7);
    word-break: break-word;
  }
  .icon:hover { background: rgba(255,255,255,0.16); border-color: rgba(255,255,255,0.28); }
  .icon.selected {
    background: rgba(201,179,236,0.45);
    border-color: rgba(255,255,255,0.5);
  }
  .icon.selected .label { background: rgba(74,52,80,0.35); border-radius: 3px; }

  /* ───────── window ───────── */
  #window {
    position: absolute;
    width: min(460px, calc(100% - 24px));
    background: var(--window-face);
    border: 1px solid var(--window-border);
    border-radius: 10px 10px 7px 7px;
    box-shadow:
      0 18px 50px -12px rgba(60,40,70,0.5),
      0 0 0 1px rgba(255,255,255,0.6) inset;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #window.open { display: flex; }

  .titlebar {
    height: 34px;
    display: flex; align-items: center;
    padding: 0 6px 0 10px;
    gap: 8px;
    cursor: grab;
    position: relative;
    background:
      linear-gradient(180deg,
        #f9c8e0 0%, #f4a6cb 9%, #ee98c2 48%,
        #e98fbb 90%, #f3aacd 100%);
    border-radius: 9px 9px 0 0;
  }
  .titlebar::after { /* glossy top sheen */
    content: '';
    position: absolute; left: 8px; right: 8px; top: 2px; height: 12px;
    background: linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0));
    border-radius: 8px;
    pointer-events: none;
  }
  .titlebar:active { cursor: grabbing; }
  .titlebar .t-icon { font-size: 16px; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }
  .titlebar .t-title {
    flex: 1;
    color: #fff;
    font-weight: 700; font-size: 14px;
    text-shadow: 0 1px 2px rgba(120,50,90,0.7);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .t-controls { display: flex; gap: 4px; }
  .t-btn {
    width: 22px; height: 22px;
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 5px;
    background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.12));
    color: #fff;
    font-size: 13px; font-weight: 800; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    text-shadow: 0 1px 1px rgba(120,50,90,0.6);
  }
  .t-btn:hover { background: linear-gradient(180deg, rgba(255,255,255,0.8), rgba(255,255,255,0.3)); }
  .t-btn.close { background: linear-gradient(180deg, #ff9fb6, #ec6f90); border-color: rgba(255,255,255,0.6); }
  .t-btn.close:hover { background: linear-gradient(180deg, #ffb3c5, #f07d9c); }

  .window-body {
    padding: 22px 22px 26px;
    overflow: auto;
    max-height: 60vh;
    min-height: 200px;
    -webkit-user-select: text; user-select: text;
  }

  /* honest placeholder doc — no fabricated content */
  .doc-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--lav);
    margin-bottom: 6px;
  }
  .doc-title {
    font-size: 22px; font-weight: 800; color: var(--text);
    margin-bottom: 16px;
  }
  .placeholder {
    border: 1.5px dashed var(--dim);
    border-radius: 10px;
    padding: 26px 20px;
    text-align: center;
    background: rgba(201,179,236,0.06);
  }
  .placeholder .mark { font-size: 26px; display: block; margin-bottom: 8px; }
  .placeholder p { color: var(--muted); font-size: 14px; line-height: 1.55; }
  .placeholder p.sub { color: var(--dim); font-size: 12.5px; margin-top: 6px; }

  /* ───────── taskbar ───────── */
  #taskbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: var(--taskbar-h);
    display: flex; align-items: center;
    padding-right: 4px;
    background:
      linear-gradient(180deg,
        #cdbbed 0%, #c2a9e6 7%, #b89ce0 50%,
        #ad8ed8 93%, #c4b0ea 100%);
    border-top: 1px solid rgba(255,255,255,0.5);
    box-shadow: 0 -2px 8px rgba(60,40,70,0.25);
    z-index: 100;
  }

  #start {
    height: 100%;
    display: flex; align-items: center; gap: 7px;
    padding: 0 18px 0 12px;
    border: none;
    font-family: inherit;
    font-size: 16px; font-weight: 800; font-style: italic;
    color: #fff;
    text-shadow: 0 1px 2px rgba(40,80,50,0.6);
    cursor: pointer;
    border-radius: 0 12px 12px 0;
    background:
      linear-gradient(180deg, #b6ecc0 0%, #97dca6 46%, #7fce90 56%, #74c688 100%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 2px 0 6px rgba(60,40,70,0.25);
  }
  #start .deer { font-size: 18px; font-style: normal; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.25)); }
  #start:hover { background: linear-gradient(180deg, #c4f0cd 0%, #a4e2b2 46%, #8bd49b 56%, #80cf93 100%); }
  #start.active { box-shadow: inset 0 2px 5px rgba(40,80,50,0.45); }

  .tasks { flex: 1; display: flex; align-items: center; gap: 6px; padding: 0 8px; height: 100%; }
  .task-btn {
    display: none;
    align-items: center; gap: 7px;
    height: 30px; min-width: 150px; max-width: 200px;
    padding: 0 12px;
    border: 1px solid rgba(255,255,255,0.4);
    border-radius: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,0.4), rgba(255,255,255,0.12));
    color: #fff; font-weight: 700; font-size: 13px;
    text-shadow: 0 1px 1px rgba(80,50,90,0.5);
    cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .task-btn.show { display: flex; }
  .task-btn.pressed {
    background: linear-gradient(180deg, rgba(120,90,140,0.35), rgba(150,120,170,0.2));
    box-shadow: inset 0 2px 4px rgba(60,40,70,0.45);
  }

  #clock {
    height: 100%;
    display: flex; align-items: center;
    padding: 0 14px;
    margin-left: 4px;
    color: #fff; font-weight: 700; font-size: 13px;
    text-shadow: 0 1px 1px rgba(80,50,90,0.5);
    border-left: 1px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.08);
  }

  /* ───────── start menu ───────── */
  #startmenu {
    position: fixed;
    left: 6px; bottom: calc(var(--taskbar-h) + 6px);
    width: 240px;
    background: var(--window-face);
    border: 1px solid var(--lav);
    border-radius: 10px;
    box-shadow: 0 18px 50px -10px rgba(60,40,70,0.55);
    overflow: hidden;
    display: none;
    z-index: 120;
  }
  #startmenu.open { display: block; animation: pop .14s ease; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .sm-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: linear-gradient(180deg, #f4a6cb, #e98fbb);
    color: #fff;
  }
  .sm-header .av { font-size: 26px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25)); }
  .sm-header .who { font-weight: 800; font-size: 15px; text-shadow: 0 1px 2px rgba(120,50,90,0.6); }
  .sm-header .who small { display: block; font-weight: 600; font-size: 11px; opacity: 0.9; }
  .sm-list { padding: 6px; }
  .sm-item {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 8px 10px;
    border: none; background: none;
    font-family: inherit; font-size: 13.5px; font-weight: 600; color: var(--text);
    border-radius: 6px; cursor: pointer; text-align: left;
  }
  .sm-item .g { font-size: 18px; width: 22px; text-align: center; }
  .sm-item:hover { background: linear-gradient(180deg, #f4a6cb, #e98fbb); color: #fff; }
  .sm-foot {
    border-top: 1px solid #f0e4ee;
    padding: 6px;
    display: flex; justify-content: flex-end;
  }
  .sm-shutdown {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border: none; background: none;
    font-family: inherit; font-size: 13px; font-weight: 700; color: var(--muted);
    border-radius: 6px; cursor: pointer;
  }
  .sm-shutdown:hover { background: #f6ecf3; color: var(--text); }

  /* little goodnight toast for the shutdown gag */
  #toast {
    position: fixed; left: 50%; top: 40%;
    transform: translate(-50%,-50%) scale(0.96);
    background: rgba(58,42,64,0.92);
    color: #fff; font-weight: 700; font-size: 15px;
    padding: 14px 22px; border-radius: 12px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    opacity: 0; pointer-events: none; z-index: 200;
    transition: opacity .3s ease, transform .3s ease;
  }
  #toast.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }

  @media (max-width: 520px) {
    .icon { width: 72px; }
    #window { width: calc(100% - 16px); }
  }
</style>
</head>
<body>
  <div id="desktop">
    <div id="icons"></div>

    <div id="window" role="dialog" aria-label="program window">
      <div class="titlebar" id="titlebar">
        <span class="t-icon" id="winIcon">📄</span>
        <span class="t-title" id="winTitle">window</span>
        <div class="t-controls">
          <button class="t-btn" id="btnMin" title="minimize" aria-label="minimize">_</button>
          <button class="t-btn" id="btnMax" title="maximize" aria-label="maximize">▢</button>
          <button class="t-btn close" id="btnClose" title="close" aria-label="close">✕</button>
        </div>
      </div>
      <div class="window-body" id="winBody"></div>
    </div>
  </div>

  <div id="startmenu">
    <div class="sm-header">
      <span class="av">🦌</span>
      <span class="who">dain<small>internet creature</small></span>
    </div>
    <div class="sm-list" id="smList"></div>
    <div class="sm-foot">
      <button class="sm-shutdown" id="shutdown"><span>🌙</span> shut down…</button>
    </div>
  </div>

  <div id="taskbar">
    <button id="start" aria-haspopup="true"><span class="deer">🦌</span> start</button>
    <div class="tasks">
      <button class="task-btn" id="taskBtn"><span id="taskIcon">📄</span> <span id="taskLabel"></span></button>
    </div>
    <div id="clock">--:--</div>
  </div>

  <div id="toast"></div>

<script>
(function () {
  // ── program registry. names are real/structural; BODIES are honest placeholders. ──
  const programs = {
    resume:      { icon: '📄', title: 'resume.doc' },
    chordial:    { icon: '💬', title: 'chordial' },
    'chaos-cube':{ icon: '🎴', title: 'chaos-commander-cube' },
    'llm-weave': { icon: '🧶', title: 'llm-weave' },
    dormant:     { icon: '📖', title: 'DORMANT.txt' },
    contact:     { icon: '✉️', title: 'contact' },
  };
  // which ones live on the desktop
  const desktopIcons = ['resume', 'chordial', 'chaos-cube', 'dormant', 'contact'];

  const win      = document.getElementById('window');
  const titlebar = document.getElementById('titlebar');
  const winIcon  = document.getElementById('winIcon');
  const winTitle = document.getElementById('winTitle');
  const winBody  = document.getElementById('winBody');
  const iconsEl  = document.getElementById('icons');
  const taskBtn  = document.getElementById('taskBtn');
  const taskIcon = document.getElementById('taskIcon');
  const taskLabel= document.getElementById('taskLabel');
  const startBtn = document.getElementById('start');
  const startMenu= document.getElementById('startmenu');
  const smList   = document.getElementById('smList');

  let current = null;
  let maximized = false;
  let prevRect = null;

  function placeholderBody(title) {
    return (
      '<div class="doc-eyebrow">internetcreature os · draft</div>' +
      '<div class="doc-title">' + title + '</div>' +
      '<div class="placeholder">' +
        '<span class="mark">✎</span>' +
        '<p>this window is empty on purpose.</p>' +
        '<p class="sub">we\'ll write what goes here together — your words, no robot filler.</p>' +
      '</div>'
    );
  }

  // ── desktop icons ──
  desktopIcons.forEach(key => {
    const p = programs[key];
    const el = document.createElement('div');
    el.className = 'icon';
    el.tabIndex = 0;
    el.innerHTML = '<span class="glyph">' + p.icon + '</span><span class="label">' + p.title + '</span>';
    el.addEventListener('click', e => {
      e.stopPropagation();
      clearSelection();
      el.classList.add('selected');
    });
    el.addEventListener('dblclick', () => openProgram(key));
    // single-tap opens on touch / also allow Enter
    el.addEventListener('keydown', e => { if (e.key === 'Enter') openProgram(key); });
    let lastTap = 0;
    el.addEventListener('pointerup', e => {
      if (e.pointerType === 'touch') {
        const now = Date.now();
        if (now - lastTap < 400) openProgram(key);
        lastTap = now;
      }
    });
    iconsEl.appendChild(el);
  });

  function clearSelection() {
    document.querySelectorAll('.icon.selected').forEach(i => i.classList.remove('selected'));
  }
  document.getElementById('desktop').addEventListener('click', () => { clearSelection(); closeStart(); });

  // ── start menu list ──
  Object.keys(programs).forEach(key => {
    const p = programs[key];
    const b = document.createElement('button');
    b.className = 'sm-item';
    b.innerHTML = '<span class="g">' + p.icon + '</span>' + p.title;
    b.addEventListener('click', e => { e.stopPropagation(); closeStart(); openProgram(key); });
    smList.appendChild(b);
  });

  // ── open / swap the single window ──
  function openProgram(key) {
    const p = programs[key];
    current = key;
    winIcon.textContent = p.icon;
    winTitle.textContent = p.title;
    winBody.innerHTML = placeholderBody(p.title);
    winBody.scrollTop = 0;

    if (!win.classList.contains('open') || win.dataset.min === '1') {
      win.classList.add('open');
      win.dataset.min = '0';
      if (!win.style.left) centerWindow();
    }
    win.style.display = 'flex';

    taskIcon.textContent = p.icon;
    taskLabel.textContent = p.title;
    taskBtn.classList.add('show');
    taskBtn.classList.remove('pressed');
  }

  function centerWindow() {
    const dw = window.innerWidth, dh = window.innerHeight - 46;
    const r = win.getBoundingClientRect();
    win.style.left = Math.max(8, (dw - r.width) / 2) + 'px';
    win.style.top  = Math.max(8, (dh - r.height) / 2 - 10) + 'px';
  }

  // ── window controls ──
  document.getElementById('btnClose').addEventListener('click', () => {
    win.classList.remove('open');
    win.style.display = 'none';
    taskBtn.classList.remove('show');
    current = null;
    if (maximized) toggleMax();
  });
  document.getElementById('btnMin').addEventListener('click', () => {
    win.style.display = 'none';
    win.dataset.min = '1';
    taskBtn.classList.add('pressed');
  });
  document.getElementById('btnMax').addEventListener('click', toggleMax);

  function toggleMax() {
    const desk = document.getElementById('desktop');
    if (!maximized) {
      prevRect = { left: win.style.left, top: win.style.top, width: win.style.width };
      win.style.left = '0px';
      win.style.top = '0px';
      win.style.width = desk.clientWidth + 'px';
      win.style.borderRadius = '0';
      win.querySelector('.window-body').style.maxHeight = (desk.clientHeight - 34) + 'px';
      maximized = true;
    } else {
      win.style.left = prevRect.left;
      win.style.top = prevRect.top;
      win.style.width = prevRect.width || 'min(460px, calc(100% - 24px))';
      win.style.borderRadius = '10px 10px 7px 7px';
      win.querySelector('.window-body').style.maxHeight = '60vh';
      maximized = false;
    }
  }

  // ── taskbar button: toggle minimize / restore ──
  taskBtn.addEventListener('click', () => {
    if (win.style.display === 'none') {
      win.style.display = 'flex';
      win.dataset.min = '0';
      taskBtn.classList.remove('pressed');
    } else {
      win.style.display = 'none';
      win.dataset.min = '1';
      taskBtn.classList.add('pressed');
    }
  });

  // ── dragging (mouse + touch via pointer events) ──
  let dragging = false, offX = 0, offY = 0;
  titlebar.addEventListener('pointerdown', e => {
    if (e.target.closest('.t-btn')) return;
    if (maximized) return;
    dragging = true;
    const r = win.getBoundingClientRect();
    offX = e.clientX - r.left;
    offY = e.clientY - r.top;
    titlebar.setPointerCapture(e.pointerId);
  });
  titlebar.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dw = window.innerWidth, dh = window.innerHeight - 46;
    let x = e.clientX - offX;
    let y = e.clientY - offY;
    const w = win.offsetWidth;
    x = Math.max(80 - w, Math.min(x, dw - 80));
    y = Math.max(0, Math.min(y, dh - 34));
    win.style.left = x + 'px';
    win.style.top = y + 'px';
  });
  titlebar.addEventListener('pointerup', e => { dragging = false; });
  titlebar.addEventListener('pointercancel', () => { dragging = false; });

  // ── start menu open/close ──
  function openStart() { startMenu.classList.add('open'); startBtn.classList.add('active'); }
  function closeStart() { startMenu.classList.remove('open'); startBtn.classList.remove('active'); }
  startBtn.addEventListener('click', e => {
    e.stopPropagation();
    startMenu.classList.contains('open') ? closeStart() : openStart();
  });
  startMenu.addEventListener('click', e => e.stopPropagation());

  // ── shutdown gag ──
  const toast = document.getElementById('toast');
  document.getElementById('shutdown').addEventListener('click', e => {
    e.stopPropagation();
    closeStart();
    toast.textContent = 'goodnight, creature 🌙';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  });

  // ── live clock ──
  function tick() {
    const d = new Date();
    let h = d.getHours(); const m = String(d.getMinutes()).padStart(2, '0');
    const ap = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    document.getElementById('clock').textContent = h + ':' + m + ' ' + ap;
  }
  tick(); setInterval(tick, 1000 * 20);

  // open one program so there's something to see on load
  openProgram('resume');
})();
</script>
</body>
</html>
